# -------------------------------------------------------------------------
# Site Settings (網站基本資訊)
# -------------------------------------------------------------------------
title: "曾建瑋的部落格" # <--- 這裡改成你的網站標題
email: "peter.qfx@gmail.com"  # <--- 你的 Email
description: >-
  碼上心經：人到中年，以 AI、Coding 為修行，記錄 LLM 影片生成等前沿技術的學習歷程與實戰筆記。
twitter_username: "petertseng_tw" # 如果沒有可以拿掉
github_username: "petertseng0517"
google_site_verification: "PqqdWkIF5JIC1d0bzMWXZn-GL-JCdZ1iNk562YaK-VQ"
og_image: "/assets/images/avatar.jpg" # 沒有指定 teaser 的頁面（例如首頁）分享縮圖的預設圖
minimal_mistakes_skin: "air" # 推薦樣式: "air", "sunrise", "default", "dark"
search: true # 開啟搜尋功能

# -------------------------------------------------------------------------
# Build Settings (建置與路徑設定 - 最重要！)
# -------------------------------------------------------------------------
# 因為你是 User Page (petertseng0517.github.io)，這兩行設定如下：
url: "https://petertseng0517.github.io"
baseurl: "" 

# -------------------------------------------------------------------------
# Theme & Plugins (主題與外掛)
# -------------------------------------------------------------------------
remote_theme: mmistakes/minimal-mistakes
#(暫時先註解)theme: minimal-mistakes-jekyll
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme # 確保 GitHub Actions 能抓到遠端主題

# -------------------------------------------------------------------------
# Localization (在地化設定)
# -------------------------------------------------------------------------
locale: "zh-TW"      # 設定語言為台灣繁體 (這會影響「閱讀更多」、「發布日期」等文字)
timezone: "Asia/Taipei" # 設定時區，確保文章日期正確
future: true             # 允許發布當日文章（避免時區差導致被視為未來文章）

# -------------------------------------------------------------------------
# Author Data (作者資訊 - 顯示在側邊欄)
# -------------------------------------------------------------------------
author:
  name: "曾建瑋 Peter Tseng"
  avatar: "/assets/images/avatar.jpg" # <--- 請記得放一張照片到這個路徑，不然會顯示破圖
  bio: "中年筆錄 | LLM 實踐"
  location: "Taiwan"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/petertseng0517"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/chian-wei-tseng/"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-f"
      url: "https://www.facebook.com/petertsengtw"

# -------------------------------------------------------------------------
# Social Profile (供首頁 Person 結構化資料 schema.html 使用，幫助 Google 確認此站的身份)
# -------------------------------------------------------------------------
social:
  name: "曾建瑋 Peter Tseng"
  links:
    - "https://github.com/petertseng0517"
    - "https://www.linkedin.com/in/chian-wei-tseng/"
    - "https://www.facebook.com/petertsengtw"

# -------------------------------------------------------------------------
# Defaults (預設行為設定 - 這裡控制每一頁長什麼樣子)
# -------------------------------------------------------------------------
defaults:
  # _posts (文章) 的預設設定
  - scope:
      path: ""
      type: posts
    values:
      layout: single        # 使用單篇文章版型
      author_profile: true  # 顯示左側作者欄
      read_time: true       # 顯示閱讀時間預估
      header:
        teaser: /assets/images/coding-bk.jpg
      comments: true        # 開啟留言 (需另外設定 Disqus 或 Giscus)
      share: true           # 顯示分享按鈕
      related: true         # 顯示底部相關文章
      toc: true             # 開啟目錄 (Table of Contents)
      toc_sticky: true      # 目錄固定在右側隨捲動移動
      toc_label: "目錄"      # 目錄的標題文字

  # _pages (一般頁面) 的預設設定
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# -------------------------------------------------------------------------
# Pagination (分頁設定)
# -------------------------------------------------------------------------
paginate: 5 # 每頁顯示幾篇文章
paginate_path: "/page:num/"

# -------------------------------------------------------------------------
# Output Configuration (輸出設定)
# -------------------------------------------------------------------------
atom_feed:
  hide: true # 隱藏 Atom feed (通常用 RSS 就好)
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  syntax_highlighter: rouge
sass:
  style: compressed